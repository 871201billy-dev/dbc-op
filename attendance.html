<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBC OP工具 - 人數回報總表匯入</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* ========================================================= */
        /* ✅ 全域變數與字體設定 (與 index.html 完全一致) */
        /* ========================================================= */
        :root { 
            --bg: #050505; 
            --sidebar: #0a0a0a; 
            --accent: #00ffcc; 
            --text: #c9d1d9; 
            --border: #1f1f1f; 
            --menu-hover: #161b22;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow: hidden; letter-spacing: 0.5px; }
        
        /* ========================================================= */
        /* ✅ 側邊欄共用外殼樣式 (已完美對齊 index.html 的最新版) */
        /* ========================================================= */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
        nav h2 { color: var(--accent); font-family: var(--font-main); font-size: 1.1rem; margin: 30px 25px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 15px 20px 15px; }
        .menu-btn { width: 100%; background: none; color: #8b949e; border: none; padding: 14px 20px; margin: 4px 0; text-align: left; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: all 0.3s ease; display: flex; justify-content: space-between; align-items: center; font-weight: 500; letter-spacing: 1px; }
        .menu-btn:hover { background: var(--menu-hover); color: #ffffff; padding-left: 25px; }
        .menu-btn.active { border-left: 2px solid var(--accent); color: #ffffff; background: var(--menu-hover); }
        .submenu { display: none; margin-bottom: 10px; border-left: 1px solid var(--border); margin-left: 20px; }
        .submenu.show { display: block; }
        .submenu a { display: block; color: #6e7681; text-decoration: none; padding: 10px 15px 10px 20px; font-size: 0.85rem; transition: 0.3s; letter-spacing: 0.5px; }
        .submenu a:hover { color: var(--accent); }
        .submenu a.current { color: #ffffff; }
        .submenu a::before { content: "› "; color: var(--border); margin-right: 8px; transition: 0.3s; }
        .submenu a:hover::before { color: var(--accent); }

        /* 右側主視窗 */
        main { flex: 1; padding: 40px; overflow-y: auto; }

        /* ========================================================= */
        /* ✅ 專屬於「人數回報匯入區」的介面設計 */
        /* ========================================================= */
        .attendance-card { 
            background: #0a0a0a; padding: 40px; border-radius: 4px; 
            border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.8); 
            max-width: 800px; margin: 0 auto; 
        }
        .attendance-card h1 { 
            margin-top: 0; color: #ffffff; font-weight: 300; 
            letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 25px; 
        }
        .terminal-box { 
            background: #000000; border: 1px solid var(--border); padding: 20px; 
            border-radius: 4px; font-family: var(--font-mono); 
            font-size: 0.85rem; color: #8b949e; line-height: 1.8; margin-bottom: 30px; 
        }
        .terminal-box span.highlight { color: var(--accent); }
        
        /* 拖曳上傳區 */
        .upload-area { 
            border: 2px dashed #30363d; padding: 60px 20px; text-align: center; 
            background: #050505; cursor: pointer; transition: 0.3s; 
            border-radius: 4px; display: block;
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: #111; }
        .upload-area input[type="file"] { display: none; }
        .upload-text { font-family: var(--font-mono); font-size: 1.1rem; color: #8b949e; pointer-events: none; margin-top: 15px; }
        .upload-icon { font-size: 3rem; display: block; }
        
        .status-text { text-align: center; color: var(--accent); font-family: var(--font-mono); margin-top: 25px; font-size: 0.95rem; min-height: 24px; }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <main>
        <div class="attendance-card">
            <h1>[ 人數回報 - 每日總表匯入系統 ]</h1>
            
            <div class="terminal-box">
                > SYSTEM BOOT... OK.<br>
                > <span class="highlight">功能說明：</span>請將每日公司系統產出的「總表複製」Excel 檔案拖曳至下方。<br>
                > <span class="highlight">執行動作：</span>系統將自動解析、覆寫資料庫，並觸發 GAS 引擎自動產出今日的人數回報表。
            </div>

            <label class="upload-area" id="drop-zone">
                <input type="file" id="file-input" accept=".xlsx, .xls, .csv">
                <span class="upload-icon">📊</span>
                <div class="upload-text" id="upload-label">> 點擊選擇檔案，或將 Excel 拖曳至此處 <</div>
            </label>

            <div id="status-box" class="status-text"></div>
        </div>
    </main>

    <script src="sidebar.js"></script>

    <script>
        // ✅ 您提供的最終版 API 網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxXNtscCW2ZDxrVsx6Yti4t5zmkF3MVEQ9TJ9LKthv-Fz-F__vkUGhoREQd_QkD-24KNw/exec"; 

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadLabel = document.getElementById('upload-label');
        const statusBox = document.getElementById('status-box');

        // 拖曳視覺效果
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) processExcel(e.dataTransfer.files[0]);
        });
        
        // 點擊選擇檔案
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processExcel(e.target.files[0]);
        });

        // 讀取與解析 Excel
        function processExcel(file) {
            uploadLabel.innerText = `> 正在解析檔案: ${file.name} <`;
            statusBox.style.color = "var(--accent)";
            statusBox.innerText = "> SYSTEM: ⚙️ 解析 Excel 資料中，請稍候...";
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = e.target.result;
                    const workbook = XLSX.read(data, {type: 'binary'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]]; 
                    let jsonMatrix = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                    
                    // 防呆：修正不規則陣列長度
                    let maxCols = 0;
                    jsonMatrix.forEach(row => { if (row.length > maxCols) maxCols = row.length; });
                    const cleanMatrix = jsonMatrix.map(row => {
                        let newRow = [...row];
                        while(newRow.length < maxCols) newRow.push("");
                        return newRow;
                    });

                    uploadToGAS(cleanMatrix);
                } catch (err) {
                    statusBox.style.color = "#da3633"; 
                    statusBox.innerText = "> ERROR: ❌ Excel 解析失敗: " + err.message;
                }
            };
            reader.readAsBinaryString(file);
        }

        // 傳送資料至後端 GAS
        function uploadToGAS(matrix) {
            statusBox.innerText = "> SYSTEM: 🚀 上傳至伺服器並執行自動核算中...";
            fetch(GAS_API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: "uploadAndGenerate", tableData: matrix }) 
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    statusBox.style.color = "#3fb950";
                    statusBox.innerText = `> SUCCESS: ✅ ${data.message}`;
                } else {
                    statusBox.style.color = "#da3633";
                    statusBox.innerText = "> ERROR: ❌ 伺服器回傳錯誤: " + data.message;
                }
            }).catch(err => {
                statusBox.style.color = "#da3633";
                statusBox.innerText = "> ERROR: ❌ 網路連線錯誤！請確認網路狀態。";
            });
        }
    </script>
</body>
</html>
