<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ＤＢＣ ｏｐ工具 - 訂單監控</title>
    <style>
        :root { 
            --bg: #050505; 
            --sidebar: #0a0a0a; 
            --accent: #00ffcc; 
            --text: #c9d1d9; 
            --border: #1f1f1f; 
            --menu-hover: #161b22;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow: hidden; letter-spacing: 0.5px; }
        
        /* 側邊欄共用外殼樣式 */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
        nav h2 { color: var(--accent); font-family: var(--font-main); font-size: 1.1rem; margin: 30px 25px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 15px 20px 15px; }
        .menu-btn { width: 100%; background: none; color: #8b949e; border: none; padding: 14px 20px; margin: 4px 0; text-align: left; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: all 0.3s ease; display: flex; justify-content: space-between; align-items: center; font-weight: 500; letter-spacing: 1px; }
        .menu-btn:hover { background: var(--menu-hover); color: #ffffff; padding-left: 25px; }
        .menu-btn.active { border-left: 2px solid var(--accent); color: #ffffff; }
        .submenu { display: none; margin-bottom: 10px; border-left: 1px solid var(--border); margin-left: 20px; }
        .submenu.show { display: block; }
        .submenu a { display: block; color: #6e7681; text-decoration: none; padding: 10px 15px 10px 20px; font-size: 0.85rem; transition: 0.3s; letter-spacing: 0.5px; }
        .submenu a:hover { color: var(--accent); }
        .submenu a.current { color: #ffffff; }
        .submenu a::before { content: "› "; color: var(--border); margin-right: 8px; transition: 0.3s; }
        .submenu a:hover::before { color: var(--accent); }

        /* 右側主視窗 */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .content-card { background: #0a0a0a; padding: 40px; border-radius: 4px; border: 1px solid var(--border); min-height: 85%; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        h1 { margin-top: 0; color: #ffffff; font-weight: 300; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 20px; }
        
        .terminal-box { background: #000000; border: 1px solid var(--border); padding: 20px; border-radius: 4px; font-family: var(--font-mono); font-size: 0.85rem; color: #8b949e; line-height: 1.6; margin-bottom: 30px; }
        .terminal-box span.highlight { color: var(--accent); }
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button.primary-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px 20px; border-radius: 2px; font-family: var(--font-mono); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        button.primary-btn:hover { background: var(--accent); color: #000; }
        button.primary-btn:disabled { border-color: #30363d; color: #8b949e; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { border: 1px solid var(--border); padding: 14px 15px; text-align: left; }
        th { background: #111111; color: var(--accent); font-family: var(--font-mono); font-weight: normal; letter-spacing: 1px; }
        tr:hover td { background: #161b22; }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <main>
        <div class="content-card">
            <h1>[ 客戶預約訂單監控 ]</h1>
            <div class="terminal-box" id="sys-log">
                > 連線協議就緒...<br>
                > 正在等待擷取最新 50 筆同業預約報表數據...
            </div>
            <div class="action-bar">
                <span style="color: #8b949e; font-size: 0.9rem;">DATA_SOURCE: DBC_B2B_DATABASE</span>
                <button class="primary-btn" id="refresh-btn" onclick="fetchOrders()">[ 刷新數據 ]</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>訂單時間</th>
                        <th>內部編號</th>
                        <th>同業代號</th>
                        <th>系列</th>
                        <th>日期</th>
                        <th>人數</th>
                        <th>總金額</th>
                        <th>客戶備註</th>
                    </tr>
                </thead>
                <tbody id="orderBody">
                    <tr><td colspan="8" style="text-align: center; color: #8b949e;">[ 系統待命中，請點擊上方刷新數據 ]</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="sidebar.js"></script>
    <script>
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx6T_sZl5cNVbPZ23cCaH9amZ8N8d-abZl2Zzu5WwKMNcgbioDHzN-Qy_94e8qm0j8M/exec";
        
        window.onload = () => { fetchOrders(); };

        function fetchOrders() {
            const btn = document.getElementById('refresh-btn');
            const tbody = document.getElementById('orderBody');
            const log = document.getElementById('sys-log');
            
            btn.disabled = true; 
            btn.innerText = "[ 讀取中... ]";
            tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #8b949e;">[ FETCHING DATA... ]</td></tr>`;
            
            fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify({ action: "getOrders" }) })
            .then(res => res.json())
            .then(res => {
                btn.disabled = false; 
                btn.innerText = "[ 刷新數據 ]";
                
                if(res.status === 'success') {
                    log.innerHTML += `<br>> <span class="highlight">連線成功！已擷取最新數據。</span>`;
                    if(res.data && res.data.orders) {
                        renderOrderTable(res.data.orders);
                    } else {
                        tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #da3633;">[ 系統錯誤：未回傳訂單資料 ]</td></tr>`;
                    }
                } else {
                    log.innerHTML += `<br>> <span style="color:#da3633">錯誤：${res.message}</span>`;
                    tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #da3633;">[ 讀取失敗：${res.message} ]</td></tr>`;
                }
            }).catch(e => {
                btn.disabled = false; 
                btn.innerText = "[ 刷新數據 ]";
                log.innerHTML += `<br>> <span style="color:#da3633">網路異常：${e.message}</span>`;
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #da3633;">[ 網路異常，無法取得數據 ]</td></tr>`;
            });
        }

        function renderOrderTable(dataMatrix) {
            const tbody = document.getElementById('orderBody'); 
            tbody.innerHTML = '';
            
            if (!dataMatrix || dataMatrix.length <= 1) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align: center; color: #8b949e;">[ 尚無任何訂單紀錄 ]</td></tr>`; 
                return;
            }
            
            // 🌟 完美對齊你的 Google Sheet 截圖
            // A[0]內部編號, B[1]訂單時間, C[2]同業代號, D[3]系列, E[4]日期, F[5]人數, G[6]總金額, H[7]客戶備註
            for(let i = 1; i < dataMatrix.length; i++) {
                let row = dataMatrix[i]; 
                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color: #8b949e;">${row[1] || '-'}</td> <!-- B欄: 訂單時間 -->
                    <td style="color: var(--accent);">${row[0] || '-'}</td> <!-- A欄: 內部編號 -->
                    <td>${row[2] || '-'}</td> <!-- C欄: 同業代號 -->
                    <td>${row[3] || '-'}</td> <!-- D欄: 系列 -->
                    <td>${row[4] || '-'}</td> <!-- E欄: 日期 -->
                    <td style="color: #d29922; font-weight: bold;">${row[5] || '-'}</td> <!-- F欄: 人數 -->
                    <td>${row[6] || '-'}</td> <!-- G欄: 總金額 -->
                    <td style="color: #8b949e; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${row[7] || ''}">${row[7] || '-'}</td> <!-- H欄: 客戶備註 -->
                `;
                tbody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
