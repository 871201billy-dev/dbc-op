<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ＤＢＣ ｏｐ工具 - 系統總覽</title>
    <style>
        :root { 
            --bg: #050505; 
            --sidebar: #0a0a0a; 
            --accent: #00ffcc; 
            --text: #c9d1d9; 
            --border: #1f1f1f; 
            --menu-hover: #161b22;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'Consolas', 'Courier New', monospace;
        }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow: hidden; letter-spacing: 0.5px; }
        
        /* 側邊欄共用外殼樣式 */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; }
        nav h2 { color: var(--accent); font-family: var(--font-main); font-size: 1.1rem; margin: 30px 25px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; }
        .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 15px 20px 15px; }
        .menu-btn { width: 100%; background: none; color: #8b949e; border: none; padding: 14px 20px; margin: 4px 0; text-align: left; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: all 0.3s ease; display: flex; justify-content: space-between; align-items: center; font-weight: 500; letter-spacing: 1px; }
        .menu-btn:hover { background: var(--menu-hover); color: #ffffff; padding-left: 25px; }
        .menu-btn.active { border-left: 2px solid var(--accent); color: #ffffff; background: var(--menu-hover); }
        .submenu { display: none; margin-bottom: 10px; border-left: 1px solid var(--border); margin-left: 20px; }
        .submenu.show { display: block; }
        .submenu a { display: block; color: #6e7681; text-decoration: none; padding: 10px 15px 10px 20px; font-size: 0.85rem; transition: 0.3s; letter-spacing: 0.5px; }
        .submenu a:hover { color: var(--accent); }
        .submenu a.current { color: #ffffff; }
        .submenu a::before { content: "› "; color: var(--border); margin-right: 8px; transition: 0.3s; }
        .submenu a:hover::before { color: var(--accent); }

        /* 右側主視窗 */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .content-card { background: #0a0a0a; padding: 50px; border-radius: 4px; border: 1px solid var(--border); min-height: 80%; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        h1 { margin-top: 0; color: #ffffff; font-weight: 300; letter-spacing: 2px; font-size: 1.5rem; margin-bottom: 30px; }
        .terminal-box { background: #000000; border: 1px solid var(--border); padding: 20px; border-radius: 4px; font-family: var(--font-mono); font-size: 0.85rem; color: #8b949e; line-height: 1.6; margin-bottom: 30px; }
        .terminal-box span.highlight { color: var(--accent); }

        /* 查詢區塊 */
        .search-bar { display: flex; gap: 15px; align-items: center; margin-bottom: 30px; }
        input[type="date"] { padding: 10px 15px; background: #000; border: 1px solid var(--border); color: #fff; font-size: 0.95rem; border-radius: 2px; font-family: var(--font-mono); outline: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input[type="date"]:focus { border-color: var(--accent); }
        
        .primary-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 10px 25px; border-radius: 2px; font-family: var(--font-mono); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
        .primary-btn:hover { background: var(--accent); color: #000; }
        .primary-btn:disabled { border-color: #30363d; color: #8b949e; cursor: not-allowed; background: transparent; }

        /* 完美還原 Excel 的表格樣式 */
        .table-container { overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; }
        table { width: max-content; border-collapse: collapse; font-size: 0.85rem; font-family: var(--font-main); background: #050505; }
        th, td { border: 1px solid #1f1f1f; padding: 10px 15px; text-align: right; white-space: nowrap; }
        
        /* 第一欄 (項目名稱) 靠左對齊 */
        td:first-child, th:first-child { text-align: left; font-weight: bold; color: var(--accent); background: #0a0a0a; position: sticky; left: 0; z-index: 1; }
        
        /* 日期列 (Row 1) */
        .row-date th { background: #111; color: #fff; text-align: center; font-size: 0.9rem; letter-spacing: 1px; }
        
        /* 標題列 (Row 2) */
        .row-header th { background: #161b22; color: #8b949e; font-weight: normal; text-align: center; }
        
        /* 黑色分隔列 (Spacer Row) */
        .row-spacer td { background: #000 !important; color: #000 !important; height: 10px; padding: 0; border: none; }
        
        /* 空白分隔欄 (Spacer Column) */
        .col-spacer { background: #000 !important; min-width: 20px; border-top: none; border-bottom: none; }
        
        /* 總計列 (Grand Total) */
        .row-grand-total td { background: #111; color: #fff; font-weight: bold; border-top: 2px solid var(--accent); }
        
        tr:hover td:not(.col-spacer):not(.row-spacer td) { background: #161b22; }
    </style>
</head>
<body>

    <div id="sidebar-container"></div>

    <main>
        <div class="content-card">
            <h1>[ 系統總覽 - 每日人數查詢 ]</h1>
            
            <div class="terminal-box" id="sys-log">
                > 系統核心模組已載入。<br>
                > 請選擇日期，以查詢當日各行程之出團人數統計。
            </div>

            <div class="search-bar">
                <input type="date" id="query-date">
                <button class="primary-btn" id="btn-query" onclick="queryAttendance()">[ 執行查詢 ]</button>
            </div>

            <div class="table-container">
                <table id="result-table">
                    <tbody id="result-body">
                        <tr><td style="text-align: center; color: #8b949e; padding: 30px;">[ 請選擇日期並點擊查詢 ]</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="sidebar.js"></script>
    <script>
        // ⚠️ 這裡使用您處理「人數回報」的那支 GAS API 網址
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxXNtscCW2ZDxrVsx6Yti4t5zmkF3MVEQ9TJ9LKthv-Fz-F__vkUGhoREQd_QkD-24KNw/exec";

        window.onload = () => {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('query-date').value = `${yyyy}-${mm}-${dd}`;
        };

        function queryAttendance() {
            const dateVal = document.getElementById('query-date').value;
            if (!dateVal) return alert("請選擇日期");

            const formattedDate = dateVal.replace(/-/g, '/');
            const btn = document.getElementById('btn-query');
            const tbody = document.getElementById('result-body');
            const log = document.getElementById('sys-log');

            btn.innerText = "[ 查詢中... ]";
            btn.disabled = true;
            tbody.innerHTML = '<tr><td style="text-align: center; color: #8b949e; padding: 30px;">[ 正在向伺服器請求資料... ]</td></tr>';

            fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getAttendanceByDate", date: formattedDate })
            })
            .then(res => res.json())
            .then(res => {
                btn.innerText = "[ 執行查詢 ]";
                btn.disabled = false;

                if (res.status === 'success') {
                    log.innerHTML = `> 查詢成功：${formattedDate}<br>> 已載入原始報表格式。`;
                    renderExactTable(res.data);
                } else {
                    log.innerHTML = `> <span style="color:#da3633">查詢失敗：${res.message}</span>`;
                    tbody.innerHTML = `<tr><td style="text-align: center; color: #da3633; padding: 30px;">[ ${res.message} ]</td></tr>`;
                }
            })
            .catch(err => {
                btn.innerText = "[ 執行查詢 ]";
                btn.disabled = false;
                log.innerHTML = `> <span style="color:#da3633">網路錯誤：${err.message}</span>`;
                tbody.innerHTML = '<tr><td style="text-align: center; color: #da3633; padding: 30px;">[ 網路連線異常 ]</td></tr>';
            });
        }

        // 完美還原 Excel 2D 陣列的渲染函數
        function renderExactTable(matrix) {
            const tbody = document.getElementById('result-body');
            tbody.innerHTML = '';
            
            if (!matrix || matrix.length === 0) {
                tbody.innerHTML = '<tr><td style="text-align: center; color: #8b949e; padding: 30px;">[ 該日無出團紀錄或尚未匯入資料 ]</td></tr>';
                return;
            }

            // 找出哪一欄是空白分隔欄 (通常在 "課程" 的前一欄)
            let spacerColIndex = -1;
            if (matrix[1]) {
                spacerColIndex = matrix[1].findIndex(cell => cell === "");
            }

            matrix.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                
                // 判斷列的樣式
                if (rowIndex === 0) tr.className = 'row-date';
                else if (rowIndex === 1) tr.className = 'row-header';
                else if (rowIndex === matrix.length - 1) tr.className = 'row-grand-total';
                else if (row[0] === "") tr.className = 'row-spacer'; // 第一格是空的代表是黑色分隔列

                row.forEach((cell, colIndex) => {
                    const td = document.createElement(rowIndex <= 1 ? 'th' : 'td');
                    
                    // 處理合併儲存格 (日期列)
                    if (rowIndex === 0) {
                        if (cell !== "") {
                            // 計算要跨幾欄 (直到遇到下一個有值的格子或陣列結束)
                            let colspan = 1;
                            for (let i = colIndex + 1; i < row.length; i++) {
                                if (row[i] === "") colspan++;
                                else break;
                            }
                            td.colSpan = colspan;
                            td.innerText = cell;
                            tr.appendChild(td);
                        }
                    } else {
                        td.innerText = cell;
                        // 套用空白分隔欄樣式
                        if (colIndex === spacerColIndex) {
                            td.className = 'col-spacer';
                            td.innerText = ''; // 清空內容
                        }
                        tr.appendChild(td);
                    }
                });
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
